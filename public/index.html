<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EB Search</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <img src="logo.png" alt="Logo do Exército" class="logo">

    <h1>Exército Brasileiro do AimGod</h1>

    <p>Pesquise pelo seu nick a patente no Exército Brasileiro</p>

    <input
        type="text"
        id="nick"
        placeholder="Digite o nick do Roblox..."
    >

    <br>

    <button onclick="consultar()">
        🔍 Consultar
    </button>

    <br><br>

    <button onclick="mostrarHierarquia()">
        🪖 Ver Hierarquia
    </button>

    <br><br>

    <button onclick="mostrarRegras()">
        📋 Regras do Exército
    </button>

    <br><br>

    <button onclick="window.location.href='discord.html'">
        💬 Discord Oficial
    </button>

    <div id="resultado"></div>

    <div id="hierarquia" style="display:none;"></div>

    <div id="regras" style="display:none;"></div>

</div>

<script src="script.js"></script>

</body>
</html>
